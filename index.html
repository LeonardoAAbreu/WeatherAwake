<!doctype html>
<html>
    <head>
        <title>WeatherAwake</title>
        <link rel="icon" type="image/x-icon" href="public/favicon.ico" />
    </head>
    <body>
        <h1>WeatherAwake</h1>
        <search>
            <form id="searchForm">
                <label for="citySearch">Search cities:</label>
                <input
                    type="search"
                    id="citySearch"
                    placeholder="Where are you?"
                    autocomplete="off"
                />
                <button type="submit">Search</button>
            </form>
        </search>
        <data>
            <p><span id="location">City</span></p>
            <p><span id="temperature">Degrees</span></p>
            <p><span id="weatherCondition">Condition</span></p>
        </data>
        <img id="weatherIcon" />
        <script type="module" src="index.js"></script>
    </body>
</html>

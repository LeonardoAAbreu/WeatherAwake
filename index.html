<!doctype html>
<html>
    <head>
        <title>WeatherAwake</title>
        <link rel="stylesheet" href="style.css" />
        <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    </head>
    <body>
        <h1>WeatherAwake</h1>
        <search>
            <form id="searchForm">
                <input
                    type="search"
                    id="citySearch"
                    placeholder="Where are you?"
                    autocomplete="off"
                />
                <button type="submit">Search</button>
            </form>
        </search>
        <div>
            <data>
                <p class="city"><span id="location"></span></p>
                <p class="temp"><span id="temperature"></span></p>
                <p class="weather">
                    <span id="weatherCondition"></span>
                </p>
            </data>
        </div>
        <img id="weatherIcon" />
        <script type="module" src="index.js"></script>
    </body>
</html>
